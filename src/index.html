<!DOCTYPE html>
<html ng-app="radar" lang="en">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>RaDaR</title>

  <!-- Webpack will inject CSS automatically -->

  <!-- IE9 support (keep if you still need it) -->
  <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->
</head>

<body>

  <div live-warning></div>

  <!-- IE warning -->
  <!--[if lte IE 9]>
    <div class="old-browser-alert" ng-if="!live">
      <i class="fa fa-exclamation-circle"></i>
      You are using an old version of Internet Explorer. RaDaR works best in modern browsers.
    </div>
  <![endif]-->

  <!-- NAVBAR -->
  <div navbar>
    <div class="navbar navbar-static-top navbar-radar">
      <div class="container-fluid">
        <div class="navbar-header">
          <a class="navbar-brand" href="/">
            <img src="radar.png" width="111" height="30" />
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div ng-if="ready">
    <div class="ui-view"></div>
  </div>

  <!-- LOADING -->
  <div ng-if="!ready" class="content">
    <div class="well">
      <strong>
        Loading <i class="fa fa-spinner fa-spin"></i>
      </strong>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>
      &copy;
      <a href="http://www.renalreg.org">UK Renal Registry</a>,
      <a href="http://www.renal.org">The Renal Association</a>
    </p>
  </div>

  <div fatal-error></div>

</body>
</html>
